<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KM TIC BOOKING – Movies</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{
color:#fff;
background:
radial-gradient(circle at 20% 30%, rgba(229,9,20,0.4), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,0,0,0.3), transparent 40%),
#0b0b0f;
min-height:100vh;
}

/* NAVBAR */

.navbar{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 30px;
background:#111;
}

.logo{
font-size:22px;
font-weight:700;
color:#e50914;
}

.menu{
display:flex;
gap:22px;
align-items:center;
}

.menu a{
color:#ccc;
text-decoration:none;
font-size:14px;
}

.menu a:hover{
color:#fff;
}

.search input{
background:#1c1c25;
border:none;
padding:9px 16px;
border-radius:20px;
color:#fff;
width:220px;
}

/* DISTRICT */

.district-select{
background:#1c1c25;
color:#fff;
border:none;
padding:8px 14px;
border-radius:20px;
}

#districtName{
margin-left:15px;
font-size:14px;
color:#ffb3b3;
}

/* BANNER */

.banner{
overflow:hidden;
margin:20px;
border-radius:18px;
}

.banner-track{
display:flex;
width:fit-content;
animation:bannerScroll 25s linear infinite;
}

.banner img{
width:420px;
height:220px;
object-fit:cover;
margin-right:20px;
border-radius:18px;
}

@keyframes bannerScroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* GRID */

.grid{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:22px;
}

/* CARD */

.card{
background:#14141c;
border-radius:16px;
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 20px 40px rgba(0,0,0,.6);
}

.poster{
height:220px;
background-size:cover;
background-position:center;
}

.card-body{
padding:14px;
}

.card-body h3{
font-size:17px;
}

.card-body p{
font-size:13px;
color:#bbb;
margin:4px 0;
}

.card-body button{
margin-top:10px;
width:100%;
padding:10px;
background:#e50914;
border:none;
border-radius:20px;
color:#fff;
font-weight:600;
cursor:pointer;
}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">KM TIC BOOKING</div>

<div class="menu">

<a href="index.html">Home</a>
<a href="movie.html">Movies</a>
<a href="event.html">Events</a>
<a href="contact.html">Contact</a>

<select class="district-select" onchange="showDistrict(this)">
<option value="">Select District</option>
<option>Chennai</option>
<option>Coimbatore</option>
<option>Madurai</option>
<option>Salem</option>
<option>Tiruchirappalli</option>
<option>Erode</option>
<option>Tiruppur</option>
<option>Vellore</option>
<option>Thoothukudi</option>
<option>Tirunelveli</option>
<option>Thanjavur</option>
<option>Dindigul</option>
<option>Kanchipuram</option>
</select>

<span id="districtName"></span>

</div>

<div class="search">
<input id="search" placeholder="Search movie...">
</div>

</div>

<!-- BANNER -->

<div class="banner">
<div class="banner-track">

<img src="https://images8.alphacoders.com/118/1180819.jpg">
<img src="https://tse2.mm.bing.net/th/id/OIP.-vNnegTNhQ0PLeZU6ayApgHaDt?pid=Api">
<img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba">
<img src="https://i.ytimg.com/vi/UOM40CZtTYc/maxresdefault.jpg">

<img src="https://images8.alphacoders.com/118/1180819.jpg">
<img src="https://tse2.mm.bing.net/th/id/OIP.-vNnegTNhQ0PLeZU6ayApgHaDt?pid=Api">
<img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba">
<img src="https://i.ytimg.com/vi/UOM40CZtTYc/maxresdefault.jpg">

</div>
</div>

<div class="grid" id="grid"></div>

<script>

const movies=[

{
name:"Demon Slayer",
place:"PVR Cinemas Chennai",
price:300,
img:"https://images8.alphacoders.com/118/1180819.jpg"
},

{
name:"Jana Nayagan",
place:"PVR Chennai",
price:250,
img:"https://th-i.thgim.com/public/entertainment/movies/6vtbo6/article69142705.ece/alternates/LANDSCAPE_1200/Jana%20Nayagan.jpeg"
},

{
name:"Fast and Furious 11",
place:"INOX Coimbatore",
price:280,
img:"https://tse4.mm.bing.net/th/id/OIP.DJPDoegpzg_0mtX7MEccHgHaEK"
},

{
name:"Doctor Doom",
place:"PVR Madurai",
price:220,
img:"https://i.ytimg.com/vi/77TRc1mrhaE/maxresdefault.jpg"
}

];

const grid=document.getElementById("grid");

function load(filter=""){

grid.innerHTML="";

movies
.filter(m=>m.name.toLowerCase().includes(filter.toLowerCase()))
.forEach(m=>{

grid.innerHTML+=`

<div class="card">

<div class="poster" style="background-image:url('${m.img}')"></div>

<div class="card-body">

<h3>${m.name}</h3>
<p>${m.place}</p>
<p>₹${m.price}</p>

<button onclick="window.location.href='movie.html'">
Book
</button>

</div>

</div>

`;

});

}

function showDistrict(select){

if(select.value!==""){

document.getElementById("districtName").innerText=
"District : "+select.value;

}

}

search.oninput=e=>load(e.target.value);

load();

</script>

</body>
</html>
